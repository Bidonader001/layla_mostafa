<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layla & Mostafa - Wedding Invitation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .invitation {
            background: white;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        .header {
            background: #f9f9f9;
            padding: 60px 40px;
            text-align: center;
            border-bottom: 1px solid #e8e8e8;
        }
        
        .header-line {
            width: 40px;
            height: 1px;
            background: #333;
            margin: 0 auto 20px;
            animation: slideInDown 0.8s ease-out;
        }
        
        .header h1 {
            font-size: 12px;
            letter-spacing: 3px;
            color: #666;
            font-weight: 400;
            text-transform: uppercase;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease-out 0.2s both;
        }
        
        .names {
            font-size: 48px;
            font-weight: 300;
            color: #1a1a1a;
            margin-bottom: 10px;
            letter-spacing: 1px;
            animation: fadeInUp 1s ease-out 0.4s both;
        }
        
        .ampersand {
            font-size: 28px;
            color: #999;
            font-weight: 300;
            margin: 10px 0;
            animation: fadeInScale 0.8s ease-out 0.6s both;
        }
        
        .content {
            padding: 50px 40px;
            text-align: center;
        }
        
        .section {
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out both;
            opacity: 0;
        }
        
        .section:nth-child(1) {
            animation-delay: 0.8s;
        }
        
        .section:nth-child(2) {
            animation-delay: 1s;
        }
        
        .section:nth-child(3) {
            animation-delay: 1.2s;
        }
        
        .section:nth-child(4) {
            animation-delay: 1.4s;
        }
        
        .section:nth-child(5) {
            animation-delay: 1.6s;
        }
        
        .section-title {
            font-size: 11px;
            letter-spacing: 2px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .section-content {
            font-size: 18px;
            color: #333;
            line-height: 1.8;
            font-weight: 300;
        }
        
        .date-time {
            font-size: 20px;
            color: #1a1a1a;
            margin: 8px 0;
            font-weight: 300;
        }
        
        .divider {
            width: 30px;
            height: 1px;
            background: #ddd;
            margin: 30px auto;
            animation: expandWidth 0.8s ease-out forwards;
            transform-origin: center;
        }
        
        .footer {
            padding: 30px 40px;
            text-align: center;
            background: #f9f9f9;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #e8e8e8;
            animation: fadeIn 0.8s ease-out 2.2s both;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes expandWidth {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 30px;
                opacity: 1;
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .scroll-fade {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .scroll-fade.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        @media (max-width: 600px) {
            .names {
                font-size: 36px;
            }
            
            .content {
                padding: 40px 25px;
            }
            
            .header {
                padding: 40px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="invitation">
        <div class="header">
            <div class="header-line"></div>
            <h1>Together with their families</h1>
            <div style="margin: 30px 0;">
                <div class="names">Layla</div>
                <div class="ampersand">&</div>
                <div class="names">Mostafa</div>
            </div>
        </div>
        
        <div class="content">
            <div class="section scroll-fade">
                <div class="section-title">Request the honour of your presence</div>
                <div class="section-content">at the celebration of their wedding</div>
            </div>
            
            <div class="divider scroll-fade"></div>
            
            <div class="section scroll-fade">
                <div class="section-title">Date & Time</div>
                <div class="date-time">Saturday, April 27, 2024</div>
                <div class="section-content" style="font-size: 16px;">
                    Evening
                </div>
            </div>
            
            <div class="section scroll-fade">
                <div class="section-title">Location</div>
                <div class="section-content">
                    Macan 32<br>
                    Oraby
                </div>
            </div>
            
            <div class="divider scroll-fade"></div>
            
            <div class="section scroll-fade">
                <div class="section-content" style="font-size: 14px; color: #666;">
                    Black tie optional
                </div>
            </div>
        </div>
        
        <div class="footer">
            Layla & Mostafa
        </div>
    </div>
    
    <script>
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -100px 0px'
        };
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);
        
        document.querySelectorAll('.scroll-fade').forEach(element => {
            observer.observe(element);
        });
    </script>
</body>
</html>
